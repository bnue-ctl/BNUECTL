<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[미래교육원] 이미지 플랫폼 사용 신청</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --primary-color: #005a9c;
            --primary-color-light: #e6f0f9;
            --success-color: #10B981;
            --text-color: #334155;
            --subtle-text-color: #94A3B8;
            --bg-color: #F8FAFC;
            --border-color: #E2E8F0;
            --card-shadow: rgba(0, 90, 156, 0.1);
            --border-radius-lg: 24px;
            --border-radius-md: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 1% 1%, rgba(0, 90, 156, 0.1) 0%, transparent 30%), radial-gradient(circle at 95% 95%, rgba(200, 215, 255, 0.2) 0%, transparent 30%);
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            width: 100%; max-width: 520px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 20px 50px var(--card-shadow);
            overflow: hidden;
            animation: fadeIn 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .app-header { padding: 40px 35px 25px 35px; text-align: center; }
        .header-logo-container {
            width: 90px; height: 90px; margin: 0 auto 25px;
            background-color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); padding: 18px;
        }
        .header-logo-container img { width: 100%; height: auto; object-fit: contain; }
        .app-header h1 { font-size: 1.5rem; font-weight: 700; color: #1E293B; margin-bottom: 12px; }
        .app-header p { color: var(--subtle-text-color); font-size: 0.95rem; line-height: 1.6; font-weight: 400; word-break: keep-all; }
        .app-content { padding: 0 40px 45px 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: #475569; letter-spacing: 0.3px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px 16px; font-size: 0.95rem; border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md); background-color: #fff; transition: all 0.2s ease; -webkit-appearance: none;
        }
        .form-group input::placeholder, .form-group textarea::placeholder { color: #CBD5E1; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 4px var(--primary-color-light); }
        .terms-box { background-color: #F8FAFC; border: 1px solid #F1F5F9; border-radius: var(--border-radius-md); padding: 15px; margin-bottom: 15px; }
        .terms-box ul { list-style: none; }
        .terms-box li { position: relative; padding-left: 20px; margin-bottom: 8px; font-size: 0.85rem; line-height: 1.6; color: #64748B; }
        .terms-box li:last-child { margin-bottom: 0; }
        .terms-box li::before { content: '✓'; position: absolute; left: 0; color: var(--primary-color); font-weight: 600; font-size: 0.9rem; }
        .checkbox-container { display: flex; align-items: center; cursor: pointer; gap: 12px; padding: 5px; user-select: none; }
        .checkbox-container input { display: none; }
        .custom-check {
            width: 22px; height: 22px; border: 2px solid var(--border-color); border-radius: 8px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s; background: white; flex-shrink: 0;
        }
        .checkbox-container input:checked + .custom-check { background-color: var(--primary-color); border-color: var(--primary-color); transform: scale(1.1); }
        .custom-check svg { width: 14px; height: 14px; stroke: white; stroke-width: 3; display: none; }
        .checkbox-container input:checked + .custom-check svg { display: block; }
        .checkbox-label { font-size: 0.9rem; font-weight: 500; color: var(--text-color); }
        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(120deg, var(--primary-color) 0%, #0077cc 100%);
            color: white; border: none; border-radius: var(--border-radius-md); font-size: 1.05rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 6px 20px var(--card-shadow); margin-top: 15px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 90, 156, 0.2); }
        .submit-btn:disabled { background: #E2E8F0; color: #94A3B8; cursor: not-allowed; transform: none; box-shadow: none; }
        #result-container { text-align: center; display: none; padding-top: 20px; animation: fadeIn 0.5s; }
        .success-icon { margin-bottom: 20px; }
        .success-icon svg { width: 72px; height: 72px; }
        .result-card { background: white; border-radius: 18px; padding: 15px; text-align: left; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .result-row + .result-row { border-top: 1px solid #F1F5F9; }
        .res-label { font-size: 0.9rem; color: #475569; font-weight: 500; }
        .res-value { font-family: 'Poppins', monospace; font-size: 1rem; color: var(--text-color); font-weight: 600; }
        .action-badge {
            font-size: 0.8rem; color: var(--primary-color); background-color: var(--primary-color-light); padding: 7px 14px;
            border-radius: 99px; cursor: pointer; font-weight: 600; text-decoration: none; transition: all 0.2s;
        }
        .site-badge { background-color: var(--success-color); color: white; }
        .action-badge:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="header-logo-container">
                <img src="https://drive.google.com/uc?export=view&id=1p6tIwROX4hL15wIw2fcK5YvdrrFpxbsK" alt="부산교육대학교 심볼 마크">
            </div>
            <h1>이미지 플랫폼 사용 신청</h1>
            <p>부산교육대학교 구성원을 위한 클립아트코리아 신청서 작성 페이지입니다.</p>
        </header>
        <section class="app-content">
            <!-- ★★★ 중요 ★★★
                 아래 <form> 태그는 서버로 데이터를 보내는 중요한 부분입니다.
                 각 input과 textarea 태그에 있는 'name' 속성은 Code.gs의 'data.이름' 과 일치해야 합니다.
                 예) name="employeeId"는 Code.gs의 data.employeeId 와 연결됩니다.
                 현재 코드는 문제가 없지만, 나중에 항목을 추가할 때 참고하세요.
            -->
            <form id="applyForm" name="google-sheet-form">
                <div class="form-group">
                    <label for="employeeId">교번 (직번)</label>
                    <input type="text" id="employeeId" name="employeeId" placeholder="교번 또는 직번을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="dept">소속</label>
                    <input type="text" id="dept" name="dept" placeholder="학과 또는 부서명을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="name">성명</label>
                    <input type="text" id="name" name="name" placeholder="성명을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="purpose">활용 목적</label>
                    <textarea id="purpose" name="purpose" rows="3" placeholder="예) 행정업무 홍보물, 강의자료 제작 등" required></textarea>
                </div>
                <div class="form-group">
                    <label>이용규정 확인</label>
                    <div class="terms-box">
                        <ul>
                            <li>개인 부주의에 의한 분쟁 발생 시 전적으로 사용자 책임입니다.</li>
                            <li>교내 업무 및 강의 콘텐츠 제작, 연구 목적 외 외부 유출 및 배포를 엄격히 금지합니다.</li>
                        </ul>
                    </div>
                    <label class="checkbox-container">
                        <input type="checkbox" id="agree" required>
                        <div class="custom-check">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <span class="checkbox-label">위 사항을 모두 확인하고 동의합니다.</span>
                    </label>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">신청하고 계정 확인하기</button>
            </form>

            <div id="result-container">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" fill="var(--primary-color-light)"/>
                        <path d="M9 12.75L11.25 15L15 9.75" stroke="var(--primary-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 style="margin-bottom: 10px;">신청이 완료되었습니다!</h2>
                <p style="font-size: 0.95rem; margin-bottom: 25px; color: var(--subtle-text-color);">아래 계정으로 바로 이용하실 수 있습니다.</p>
                <div class="result-card">
                    <div class="result-row">
                        <span class="res-label">사이트</span>
                        <a href="https://www.clipartkorea.co.kr/" target="_blank" rel="noopener noreferrer" class="action-badge site-badge">클립아트코리아 바로가기</a>
                    </div>
                    <div class="result-row">
                        <span class="res-label">아이디</span>
                        <div><span class="res-value" id="resId">bnuectl</span><span class="action-badge" onclick="copyText('resId', this)">복사</span></div>
                    </div>
                    <div class="result-row">
                        <span class="res-label">비밀번호</span>
                        <div><span class="res-value" id="resPw">alforydbr@@7195</span><span class="action-badge" onclick="copyText('resPw', this)">복사</span></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        const form = document.getElementById('applyForm');
        // ▼▼▼▼▼ 여기에 새로 배포한 Apps Script URL을 반드시 넣어주세요! ▼▼▼▼▼
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwk7-DjOQWefQv09cFwb_KA0bHL9YI3WfIblzVPCZYWw1QFsGUJLjSSlt07kSq8BOU0/exec';

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '신청하는 중...';

            // form 안의 input 값들을 JSON 객체로 만듭니다.
            const formData = {
                employeeId: document.getElementById('employeeId').value,
                dept: document.getElementById('dept').value,
                name: document.getElementById('name').value,
                purpose: document.getElementById('purpose').value,
            };

            // 데이터를 JSON 문자열 형태로 서버에 전송합니다.
            fetch(scriptURL, {
                method: 'POST',
                // mode: 'no-cors'는 응답을 받지 않겠다는 의미입니다. 
                // 그래서 서버에 오류가 나도 성공한 것처럼 보일 수 있습니다.
                // 하지만 현재 구조에서는 이 방법이 가장 간단합니다.
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(response => {
                // 성공적으로 전송되면 (서버의 실제 성공 여부와 관계없이) 결과 화면을 보여줍니다.
                document.getElementById('applyForm').style.display = 'none';
                document.getElementById('result-container').style.display = 'block';
            })
            .catch(error => {
                // 네트워크 오류 등 전송 자체가 실패했을 때 실행됩니다.
                console.error('Error!', error.message);
                alert('오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                btn.disabled = false;
                btn.innerText = '신청하고 계정 확인하기';
            });
        });

        function copyText(elementId, buttonElement) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = buttonElement.innerText;
                buttonElement.innerText = '복사 완료!';
                buttonElement.style.backgroundColor = 'var(--success-color)';
                buttonElement.style.color = 'white';
                setTimeout(() => {
                    buttonElement.innerText = originalText;
                    buttonElement.style.backgroundColor = '';
                    buttonElement.style.color = '';
                }, 1500);
            }).catch(err => {
                alert('복사에 실패했습니다.');
            });
        }
    </script>
</body>
</html>
